	<body>
		<div id="bottom" class="scroller">
			<div>
				<span style=""></span>
				<p id="output">
					write text into the dield below ,.., itll replace this !!
				</p>
			</div>
			<textarea id="input"></textarea>
			<br>
			<div id="buttons">
				<button onclick="styleText('cIsHealth')" class="cIsHealth">cIsHealth</button>
				<button onclick="styleText('cIsDamage')" class="cIsDamage">cIsDamage</button>
				<button onclick="styleText('cIsHealing')" class="cIsHealing">cIsHealing</button>
				<button onclick="styleText('cIsUtility')" class="cIsUtility">cIsUtility</button>
				<button onclick="styleText('cIsVoid')" class="cIsVoid">cIsVoid</button>
				<button onclick="styleText('cStack')" class="cStack">cStack</button>
				<button onclick="styleText('cWorldEvent')" class="cWorldEvent">cWorldEvent</button>
				<button onclick="styleText('cArtifact')" class="cArtifact">cArtifact</button>
				<button onclick="styleText('cUserSetting')" class="cUserSetting">cUserSetting</button>
				<button onclick="styleText('cDeath')" class="cDeath">cDeath</button>
				<button onclick="styleText('cSub')" class="cSub">cSub</button>
				<button onclick="styleText('cMono')" class="cMono">cMono</button>
				<button onclick="styleText('cShrine')" class="cShrine">cShrine</button>
				<button onclick="styleText('cEvent')" class="cEvent">cEvent</button>
				<button onclick="styleText('cHumanObjective')" class="cHumanObjective">cHumanObjective</button>
				<button onclick="styleText('cLunarObjective')" class="cLunarObjective">cLunarObjective</button>
				<br><br>
				<button onclick="undo()" style="color: #eeeeee">undo</button><br>
                <button onclick="newline()" id="newline">use \n for newlines?</button><br>
                <button onclick="quotationsfunc()" id="quotations">use " in color tags ? (eg. style="cIsDamage" vs style=cIsDamage</button><br>
                <button onclick="example()" id="example">example item desc (coffee bag ss2 !!</button><br><br>
                <button onclick="newlineconverter()" id="newlineconverter">convert real new lines to \n !!!</button> <br>
                <button onclick="newlineconverterback()" id="newlineconverterback">convert \n to real new lines !!!</button> <br>
                <button onclick="quoteconverter()" id="quoteconverter">convert " to \" (needed for ingame .,,.</button> <br>
			</div>
			<div>
				<p>
					select something in the dialog box then click one of the buttons above to style it!!!!!<br>
                    game uses textmeshpro to render text ,,.,. <a href="https://docs.unity3d.com/Packages/com.unity.textmeshpro@4.0/manual/RichTextSupportedTags.html" target="_blank">list of supported tags for those</a> !! !
				</p>
			</div>
            <div id="buttons">
                <button onclick="share()" id="share">copy share link to clipboar d.,.,</button>
            </div>
            <p id="copied">
                copied url to clipboard !!!
            </p>
		</div>
		<script>
			let historyarray = [];
            let newlineisnewline = true;
            let quotations = false;

            let text = document.getElementById('input');
            let output = document.getElementById('output');

            function example(){
                text.value = "<style=cIsDamage>8%</style> chance on hit to drop a coffee bean that grants <style=cIsDamage>8% attack speed</style> and <style=cIsUtility>movement speed</style> for <style=cIsUtility>5</style> <style=cStack>(+5 per stack)</style> <style=cIsUtility>seconds</style>.";
                formattext();
            }

            function newlineconverter(){
                text.value = text.value.replaceAll("\n", "\\n");
                if(newlineisnewline)
                {
                    newline();
                }
                formattext();
            }

            function newlineconverterback(){
                text.value = text.value.replaceAll("\\n", "\n");
                if(!newlineisnewline)
                {
                    newline();
                }
                formattext();
            }

            function quoteconverter()
            {
                text.value = text.value.replaceAll("\"", "\"");
            }

			function styleText(string) {
				var selection = text.value.substring(input.selectionStart, input.selectionEnd);
				var preselection = text.value.substring(0, input.selectionStart);
				var postselection = text.value.substring(input.selectionEnd, text.value.length);
				console.log(selection);

				if(selection !== ""){
                    if(quotations){
                        text.value = preselection + "<style=\"" + string + "\">" + selection + "</style>" + postselection;
                    }
                    else
                    {
                        text.value = preselection + "<style=" + string + ">" + selection + "</style>" + postselection;
                    }
					formattext()
				}

				if(historyarray[historyarray.length - 1] !== text.value || historyarray.length === 0){
					historyarray.push(text.value);
				}
				console.log(historyarray);
			}

			text.addEventListener('input', function (event) {
				formattext()

				if(historyarray[historyarray.length - 1] !== text.value || historyarray.length === 0){
					historyarray.push(text.value);
				}
				console.log(historyarray);
			});

            function newline(){
                var text = document.getElementById('newline');
                newlineisnewline = !newlineisnewline;
                if(!newlineisnewline)
                    text.style.color = "#99ff99";
                else
                    text.style.color = "#ff9999";

                formattext()
            }

            function quotationsfunc(){
                var text = document.getElementById('quotations');
                quotations = !quotations;
                if(quotations)
                    text.style.color = "#99ff99";
                else
                    text.style.color = "#ff9999";

                formattext()
            }

			function formattext() {
                var newtext = text.value

                newtext = newtext.replaceAll("</style>", "</span>");
                newtext = newtext.replaceAll("</color>", "</span>");
                newtext = newtext.replaceAll("<style", "<span class");
                newtext = newtext.replaceAll("<color=", "<span style=color:");
                newtext = newtext.replaceAll("\\\"", "\"");
                if (newlineisnewline)
                {
                    newtext = newtext.replaceAll("\n", "<br>");
                }
                else
                {
                    newtext = newtext.replaceAll("\\n", "<br>");
                }

				output.innerHTML = newtext;
			}

			function undo(){
				if (historyarray.length === 1) {
					return;
				}
				text.value = historyarray[historyarray.length - 2];
				historyarray.pop()
				formattext()
			}

            const url = new URL(location.href);
            const sharedText = url.searchParams.get('text');
            const sharedNewline = url.searchParams.get('newline');
            if(sharedText !== undefined && sharedText !== null)
            {
                output.innerHTML = sharedText;
                text.value = sharedText;
                formattext();
            }
            if(sharedNewline !== undefined && sharedNewline !== null)
            {
                newline();

                formattext();
            }

            function share()
            {
                var params = new URLSearchParams({ text: text.value });
                var url = `https://icebro.party/ror2helper/?${params.toString()}`;
                if(!newlineisnewline)
                {
                    params = new URLSearchParams({ newline: newlineisnewline.toString() });
                    url += `&${params.toString()}`;
                }

                console.log(url);
                navigator.clipboard.writeText(url);
                document.getElementById("copied").classList.remove("anim");
                document.getElementById("copied").classList.add("anim");
                setTimeout(function(){ document.getElementById("copied").classList.remove("anim"); }, 1000)
            }
        </script>
	</body>
